<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Calendar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Chat screen ── */
    #chat-screen {
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      width: min(700px, 100vw - 32px);
      height: min(600px, 100dvh - 32px);
      overflow: hidden;
    }

    #chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #chat-header h2 { font-size: 1rem; font-weight: 600; }

    #ws-status {
      font-size: .75rem;
      padding: 3px 10px;
      border-radius: 20px;
    }
    #ws-status.connected    { background: #e6f4ea; color: #1e8e3e; }
    #ws-status.disconnected { background: #fce8e6; color: #c5221f; }
    #ws-status.connecting   { background: #fef7e0; color: #b06000; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: .92rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user      { align-self: flex-end; background: #1a73e8; color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant { align-self: flex-start; background: #f1f3f4; color: #202124; border-bottom-left-radius: 4px; }
    .msg.system    { align-self: center; font-size: .78rem; color: #999; background: none; padding: 2px 0; }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #f0f0f0;
    }
    #input-row input {
      flex: 1;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .95rem;
      outline: none;
      transition: border-color .15s;
    }
    #input-row input:focus { border-color: #1a73e8; }
    #input-row button {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }
    #input-row button:hover    { background: #1557b0; }
    #input-row button:disabled { background: #c5d8f6; cursor: default; }
  </style>
</head>
<body>

<!-- Chat screen -->
<div id="chat-screen">
  <div id="chat-header">
    <h2>📅 Smart Calendar</h2>
    <span id="ws-status" class="disconnected">Disconnected</span>
  </div>
  <div id="messages"></div>
  <div id="input-row">
    <input id="msg-input" type="text" placeholder="Ask me to schedule, find, or update events…" autocomplete="off" />
    <button id="send-btn" disabled>Send</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const msgInput   = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');
  const wsStatus   = document.getElementById('ws-status');

  let ws = null;
  let streamingEl = null; // current assistant bubble being streamed into

  // ── WebSocket ────────────────────────────────────────────────────────────────

  function connectWS() {
    setWsStatus('connecting');
    ws = new WebSocket('ws://' + location.host + '/ws');

    ws.onopen = () => {
      setWsStatus('connected');
      sendBtn.disabled = false;
      addMessage('system', 'Connected — ask me anything about your calendar.');
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.t === 'c') {
        appendChunk(msg.v);
      } else if (msg.t === 'e') {
        streamingEl = null;
        sendBtn.disabled = false;
        msgInput.focus();
      }
    };

    ws.onclose = () => {
      setWsStatus('disconnected');
      sendBtn.disabled = true;
      streamingEl = null;
      addMessage('system', 'Disconnected.');
    };

    ws.onerror = () => {
      addMessage('system', 'Connection error.');
    };
  }

  function setWsStatus(state) {
    wsStatus.className = state;
    wsStatus.textContent = state.charAt(0).toUpperCase() + state.slice(1);
  }

  function send() {
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    addMessage('user', text);
    ws.send(text);
    msgInput.value = '';
    sendBtn.disabled = true;
  }

  // ── UI helpers ───────────────────────────────────────────────────────────────

  function addMessage(role, text) {
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    el.textContent = text;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  function appendChunk(text) {
    if (!streamingEl) {
      streamingEl = addMessage('assistant', '');
    }
    streamingEl.textContent += text;
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  connectWS();
</script>
</body>
</html>
